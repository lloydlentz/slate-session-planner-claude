<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conference Session Planner — Slate Summit 2026</title>
  <meta name="description" content="Plan your team's conference schedule for Slate Summit 2026">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="top-bar" aria-label="Application">
    <div id="brand">Slate Summit 2026</div>
    <nav id="main-nav">
      <a href="#" class="nav-link active" data-view="sessions">Sessions</a>
      <a href="#" class="nav-link" data-view="schedule">Schedule</a>
      <a href="#" class="nav-link" data-view="settings">⚙ Settings</a>
      <a href="https://github.com/lloydlentz/slate-session-planner-claude/issues" target="_blank" class="nav-link">Feedback</a>
      <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle light/dark mode">🌙</button>
      <span id="sync-dot" class="sync-dot hidden" title="Sync status"></span>
    </nav>
  </header>

  <div id="filter-strip" class="hidden">
    <div class="filter-group">
      <span id="label-day" class="filter-label">Day</span>
      <div id="filter-day" class="filter-pills" role="group" aria-labelledby="label-day">
        <button class="pill active" data-value="All">All</button>
        <button class="pill" data-value="Wednesday">Wed</button>
        <button class="pill" data-value="Thursday">Thu</button>
        <button class="pill" data-value="Friday">Fri</button>
      </div>
    </div>
    <div class="filter-group">
      <span id="label-type" class="filter-label">Type</span>
      <div id="filter-type" class="filter-pills" role="group" aria-labelledby="label-type"></div>
    </div>
    <div class="filter-group">
      <span id="label-member" class="filter-label">Member</span>
      <div id="filter-member" class="filter-pills" role="group" aria-labelledby="label-member">
        <button class="pill active" data-value="All">All</button>
      </div>
    </div>
    <div class="filter-group">
      <span id="label-status" class="filter-label">Status</span>
      <div id="filter-status" class="filter-pills" role="group" aria-labelledby="label-status">
        <button class="pill active" data-value="All">All</button>
        <button class="pill" data-value="interested">Interested</button>
        <button class="pill" data-value="going">Going</button>
      </div>
    </div>
    <div class="filter-group view-toggle-group">
      <div id="view-mode-toggle" class="view-mode-toggle">
        <button class="view-mode-btn active" data-mode="tiles" title="Tile view">⊞ Tiles</button>
        <button class="view-mode-btn" data-mode="list" title="List view">☰ List</button>
      </div>
    </div>
  </div>

  <main id="main-content">
    <div id="view-sessions" class="view"></div>
    <div id="view-schedule" class="view hidden"></div>
    <div id="view-settings" class="view hidden"></div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
